<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoAnim</title>
    <link rel="icon" href="./images/FavIcon_64x64.ico" sizes="any">

    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #0d0d0d;
            font-family: Arial, sans-serif;
        }

        img {
            max-width: 80%;
            max-height: 70vh;
            height: auto;
            width: auto;
        }

        .contact {
            position: absolute;
            bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            font-size: 14px;
        }

        .contact button,
        .contact a {
            color: #cccccc;
            background: none;
            border: 1px solid #444;
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s ease, border-color 0.3s ease;
        }

        .contact button:hover,
        .contact a:hover {
            color: #ffffff;
            border-color: #888;
        }

        #emailLink {
            display: none;
            border: none;
            padding: 0;
        }

        #captchaBox {
            display: none;
        }
    </style>
</head>
<body>

    <img src="./images/Title_820x820.png" alt="NoAnim Logo">

    <div class="contact">
        <button id="revealBtn" type="button">Show contact email</button>
        <div id="captchaBox"></div>
        <a id="emailLink"></a>
    </div>

    <script>
        const revealBtn = document.getElementById("revealBtn");
        const captchaBox = document.getElementById("captchaBox");
        const emailLink = document.getElementById("emailLink");

        let widgetRendered = false;

        revealBtn.addEventListener("click", () => {
            captchaBox.style.display = "block";

            if (!widgetRendered) {
                turnstile.render("#captchaBox", {
                    sitekey: "YOUR_SITE_KEY",
                    callback: function(token) {
                        const user = "contact";
                        const domain = "noanim.com";
                        const email = user + "@" + domain;

                        emailLink.href = "mailto:" + email;
                        emailLink.textContent = email;
                        emailLink.style.display = "inline";

                        revealBtn.style.display = "none";
                        captchaBox.style.display = "none";
                    }
                });

                widgetRendered = true;
            }
        });
    </script>

</body>
</html>
