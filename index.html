<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoAnim</title>
    <link rel="icon" href="./images/FavIcon_64x64.ico" sizes="any">

    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #0d0d0d;
            font-family: Arial, sans-serif;
        }

        img {
            max-width: 80%;
            max-height: 70vh;
            height: auto;
            width: auto;
        }

        .contact {
            position: absolute;
            bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            font-size: 14px;

            color: #ffffff;
        }
        .contact a:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <img src="./images/Title_820x820.png" alt="NoAnim Logo">

    <div class="contact">
    <a id="email"></a>
    </div>
    
    <script>
        const user = "contact";
        const domain = "noanim.com";
        const email = user + "@" + domain;
    
        const link = document.getElementById("email");
        link.href = "mailto:" + email;
        link.textContent = email;
    </script>

</body>
</html>
