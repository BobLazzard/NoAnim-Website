<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoAnim</title>

    <link rel="icon" href="./images/FavIcon_64x64.ico" sizes="any">
    
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #0d0d0d;
            font-family: Arial, sans-serif;
        }

        img {
            max-width: 80%;
            max-height: 70vh;
            height: auto;
            width: auto;
        }

        .contact {
            position: absolute;
            bottom: 30px;
            display: flex;
            gap: 40px; /* space between emails */
            font-size: 14px;
        }

        .contact a {
            color: #cccccc;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .contact a:hover {
            color: #ffffff;
        }

        .contact form {
            display: flex;
            gap: 10px;
        }
        
        .contact input {
            background-color: #1a1a1a;
            border: 1px solid #333;
            color: #cccccc;
            padding: 8px 10px;
            font-size: 14px;
            outline: none;
        }
        
        .contact input::placeholder {
            color: #666;
        }
        
        .contact input:focus {
            border-color: #888;
        }
        
        .contact button {
            background-color: transparent;
            border: 1px solid #333;
            color: #cccccc;
            padding: 8px 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .contact button:hover {
            border-color: #ffffff;
            color: #ffffff;
        }
    </style>
</head>

<body>

    <img src="./images/Title_820x820.png" 
         alt="NoAnim Logo">

    <div class="contact">
    <form action="https://formspree.io/f/YOUR_ID" method="POST">
        <input 
            type="email" 
            name="email" 
            placeholder="Your email" 
            required
        >
        <button type="submit">Contact</button>
    </form>
    </div>

</body>
</html>
